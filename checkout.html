<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout - Huryan Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; }
        .luxury-grid-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="luxury-grid-bg text-slate-900 min-h-screen pb-12">

    <header class="bg-slate-950 text-white py-6 shadow-md mb-8">
        <div class="container mx-auto px-4 max-w-6xl flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter">HURYAN<span class="text-amber-500">.</span></a>
            <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-amber-400 transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> শপিংয়ে ফিরে যান
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-7 bg-white p-6 md:p-8 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                <div>
                    <h2 class="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-truck-fast text-amber-500"></i> ডেলিভারি ও পেমেন্ট তথ্য
                    </h2>
                    <p class="text-slate-400 text-xs mt-1">অর্ডারটি সম্পন্ন করতে নিচের সঠিক তথ্যগুলো প্রদান করুন।</p>
                </div>

                <form id="checkout-form" class="space-y-4" onsubmit="handleOrderSubmit(event)">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">আপনার সম্পূর্ণ নাম *</label>
                        <input type="text" id="cust-name" required placeholder="উদা: মো: আরিয়ান খান" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">মোবাইল নম্বর *</label>
                            <input type="tel" id="cust-phone" required placeholder="উদা: 017XXXXXXXX" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">বিকল্প মোবাইল নম্বর (ঐচ্ছিক)</label>
                            <input type="tel" id="cust-phone-alt" placeholder="অন্য কোনো নম্বর" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">সম্পূর্ণ ঠিকানা *</label>
                        <textarea id="cust-address" required rows="3" placeholder="বাসা নম্বর, রোড নম্বর, এলাকা, থানা এবং জেলার নাম উল্লেখ করুন" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">ডেলিভারি এরিয়া *</label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="border rounded-xl p-4 flex items-center justify-between cursor-pointer hover:border-amber-500 transition bg-slate-50">
                                <div class="flex items-center gap-2">
                                    <input type="radio" name="delivery-zone" value="inside" checked onclick="updateShippingCost(60)" class="accent-slate-900">
                                    <span class="text-xs font-bold text-slate-800">ঢাকার ভেতরে</span>
                                </div>
                                <span class="text-xs font-black text-slate-900">৳৬০</span>
                            </label>
                            <label class="border rounded-xl p-4 flex items-center justify-between cursor-pointer hover:border-amber-500 transition bg-slate-50">
                                <div class="flex items-center gap-2">
                                    <input type="radio" name="delivery-zone" value="outside" onclick="updateShippingCost(120)" class="accent-slate-900">
                                    <span class="text-xs font-bold text-slate-800">ঢাকার বাইরে</span>
                                </div>
                                <span class="text-xs font-black text-slate-900">৳১২০</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">পেমেন্ট মেথড</label>
                        <div class="border border-slate-200 rounded-xl p-4 bg-amber-50/50 flex items-center gap-3">
                            <i class="fa-solid fa-hand-holding-dollar text-slate-800 text-lg"></i>
                            <div>
                                <p class="text-xs font-bold text-slate-900">Cash on Delivery (ক্যাশ অন ডেলিভারি)</p>
                                <p class="text-[10px] text-slate-500">পণ্য হাতে পেয়ে চেক করে টাকা পরিশোধ করবেন।</p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-slate-950 hover:bg-amber-500 hover:text-slate-950 text-white font-black py-4 rounded-xl transition duration-300 text-sm uppercase tracking-wider shadow-lg">
                        অর্ডার কনফার্ম করুন
                    </button>
                </form>
            </div>

            <div class="lg:col-span-5 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm sticky top-24 space-y-4">
                <h3 class="text-lg font-black text-slate-900 border-b pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-basket-shopping text-slate-500"></i> আপনার অর্ডার বিবরণী
                </h3>

                <div id="checkout-items-list" class="divide-y divide-slate-100 max-h-60 overflow-y-auto pr-2"></div>

                <div class="space-y-2 pt-3 border-t border-slate-100 text-xs">
                    <div class="flex justify-between text-slate-500">
                        <span>সাবটোটাল:</span>
                        <span class="font-bold text-slate-900">৳<span id="summary-subtotal">0</span></span>
                    </div>
                    <div class="flex justify-between text-slate-500">
                        <span>ডেলিভারি চার্জ:</span>
                        <span class="font-bold text-slate-900">৳<span id="summary-shipping">60</span></span>
                    </div>
                    <hr class="border-dashed my-2">
                    <div class="flex justify-between text-sm font-black">
                        <span class="text-slate-900">সর্বমোট প্রদেয়:</span>
                        <span class="text-amber-600 text-lg">৳<span id="summary-total">0</span></span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let cartData = [];
        let shippingCost = 60;

        function loadCartSummary() {
            const storedCart = localStorage.getItem('huryan_cart');
            if (storedCart) {
                try {
                    cartData = JSON.parse(storedCart);
                } catch(e) {
                    cartData = [];
                }
            }

            const container = document.getElementById('checkout-items-list');
            if (!cartData || cartData.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-sm py-6 text-center">আপনার কার্টে কোনো প্রোডাক্ট নেই!</p>`;
                setTimeout(() => { window.location.href = "index.html"; }, 1500);
                return;
            }

            container.innerHTML = cartData.map(item => `
                <div class="flex items-center justify-between py-3">
                    <div class="flex items-center gap-3">
                        <img src="${item.image}" class="w-12 h-12 object-contain border rounded-xl p-1 bg-slate-50">
                        <div>
                            <h4 class="font-bold text-slate-800 text-xs line-clamp-1 w-40">${item.name}</h4>
                            <p class="text-[10px] text-slate-400">পরিমাণ: ${item.quantity} ✕ ৳${item.price}</p>
                        </div>
                    </div>
                    <span class="text-xs font-black text-slate-900">৳${(item.price * item.quantity).toLocaleString()}</span>
                </div>
            `).join('');

            calculateTotals();
        }

        function calculateTotals() {
            const subtotal = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + shippingCost;

            document.getElementById('summary-subtotal').innerText = subtotal.toLocaleString();
            document.getElementById('summary-shipping').innerText = shippingCost;
            document.getElementById('summary-total').innerText = total.toLocaleString();
        }

        function updateShippingCost(cost) {
            shippingCost = cost;
            calculateTotals();
        }

        function handleOrderSubmit(e) {
            e.preventDefault();

            const orderDetails = {
                customer: {
                    name: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    altPhone: document.getElementById('cust-phone-alt').value,
                    address: document.getElementById('cust-address').value,
                    zone: document.querySelector('input[name="delivery-zone"]:checked').value
                },
                products: cartData,
                totalAmount: cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0) + shippingCost
            };

            console.log("কনফার্মড অর্ডার অবজেক্ট:", orderDetails);
            alert(`ধন্যবাদ ${orderDetails.customer.name}! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে।`);
            
            localStorage.removeItem('huryan_cart');
            window.location.href = "index.html";
        }

        document.addEventListener("DOMContentLoaded", loadCartSummary);
    </script>
</body>
</html>
